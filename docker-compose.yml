services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ocupacion
      POSTGRES_PASSWORD: ocupacion
      POSTGRES_DB: ocupacion
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocupacion"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ocupacion:ocupacion@postgres:5432/ocupacion
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
