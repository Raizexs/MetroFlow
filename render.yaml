services:
  - type: web
    name: ocupacion-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ocupacion-db
          property: connectionString
      - key: CORS_EXTRA_ORIGIN
        sync: false

databases:
  - name: ocupacion-db
    plan: free
    databaseName: ocupacion
    user: ocupacion
