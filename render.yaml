# Blueprint Render: solo PaaS (API). PostgreSQL vive en AWS EC2 (IaaS).
# Definir DATABASE_URL manualmente en el dashboard apuntando a EC2.
services:
  - type: web
    name: ocupacion-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_EXTRA_ORIGIN
        sync: false
